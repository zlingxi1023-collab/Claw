<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FFF8E7">
    <meta name="format-detection" content="telephone=no">
    <title>Try Everything 歌词学习卡片 🎵</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 预连接音频资源 -->
    <link rel="preload" href="audio/stage1_card1.mp3" as="audio">
</head>
<body>
    <div class="container">
        <!-- 头部标题区域 -->
        <header class="header">
            <div class="header-characters">
                <div class="bunny-mini"></div>
                <h1>Try Everything</h1>
                <div class="fox-mini"></div>
            </div>
            <p class="subtitle">疯狂动物城主题曲 · 分阶段学习</p>
        </header>

        <!-- 音乐播放区域 -->
        <div class="music-player-section">
            <div class="music-header">
                <span class="music-icon">🎵</span>
                <span class="music-title">原曲已内嵌 · 边听边学</span>
                <span class="music-artist">Shakira</span>
            </div>
            <p class="music-tip">🎧 每张卡片配有原曲片段，点击 ▶ 播放<br>💡 点击「🎵 全部播放」开启沉浸式跟唱模式~</p>
        </div>

        <!-- 进度指示器 -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- 阶段导航 — 可横向滚动 -->
        <div class="stage-nav" id="stageNav">
            <button class="stage-btn active" data-stage="1">第1阶段</button>
            <button class="stage-btn" data-stage="2">第2阶段</button>
            <button class="stage-btn" data-stage="3">第3阶段</button>
            <button class="stage-btn" data-stage="4">第4阶段</button>
            <button class="stage-btn" data-stage="5">第5阶段</button>
            <button class="stage-btn" data-stage="6">第6阶段</button>
        </div>

        <!-- 主角色装饰 -->
        <div class="characters-container">
            <div class="character bunny">
                <div class="bunny-ear left"></div>
                <div class="bunny-ear right"></div>
                <div class="bunny-face">
                    <div class="bunny-eye left"></div>
                    <div class="bunny-eye right"></div>
                    <div class="bunny-nose"></div>
                    <div class="bunny-mouth"></div>
                    <div class="bunny-cheek left"></div>
                    <div class="bunny-cheek right"></div>
                </div>
            </div>

            <!-- 卡片区域 -->
            <div class="cards-wrapper" id="cardsWrapper">
                <!-- 卡片将通过JS动态生成 -->
            </div>

            <div class="character fox">
                <div class="fox-ear left"></div>
                <div class="fox-ear right"></div>
                <div class="fox-face">
                    <div class="fox-eye left"></div>
                    <div class="fox-eye right"></div>
                    <div class="fox-nose"></div>
                    <div class="fox-mouth"></div>
                    <div class="fox-cheek left"></div>
                    <div class="fox-cheek right"></div>
                </div>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="control-btn prev-btn" id="prevBtn">
                <span class="btn-icon">◀</span>
                <span>上一阶段</span>
            </button>
            <button class="control-btn autoplay-btn" id="autoPlayBtn">
                <span class="btn-icon">🎵</span>
                <span>全部播放</span>
            </button>
            <button class="control-btn flip-btn" id="flipAllBtn">
                <span class="btn-icon">🔄</span>
                <span>翻转卡片</span>
            </button>
            <button class="control-btn next-btn" id="nextBtn">
                <span>下一阶段</span>
                <span class="btn-icon">▶</span>
            </button>
        </div>

        <!-- 学习提示 -->
        <div class="tips-box">
            <div class="tip-character"></div>
            <div class="tip-content">
                <p class="tip-title">💡 学习小贴士</p>
                <p class="tip-text" id="tipText">点击卡片可以翻转查看中文意思哦！</p>
            </div>
        </div>

        <!-- 底部装饰 -->
        <footer class="footer">
            <div class="city-skyline">
                <div class="building b1"></div>
                <div class="building b2"></div>
                <div class="building b3"></div>
                <div class="building b4"></div>
                <div class="building b5"></div>
            </div>
            <p>🎬 加油！你一定能学会这首歌！🌟</p>
        </footer>
    </div>

    <!-- 全屏歌曲播放器 Overlay -->
    <div class="full-player-overlay" id="fullPlayerOverlay">
        <!-- 顶部固定控制栏 -->
        <div class="fp-controls">
            <button class="fp-close-btn" id="fpCloseBtn" title="关闭">✕</button>
            <div class="fp-progress-info">
                <span class="fp-progress-text" id="fpProgressText">第 1 / 19 句</span>
                <div class="fp-progress-bar">
                    <div class="fp-progress-bar-fill" id="fpProgressBarFill"></div>
                </div>
            </div>
            <button class="fp-play-btn" id="fpPlayBtn" title="播放/暂停">
                <span id="fpPlayIcon">▶</span>
            </button>
        </div>
        <!-- 歌词卡片滚动区域 -->
        <div class="fp-cards-scroll" id="fpCardsScroll">
            <!-- 卡片通过 JS 动态渲染 -->
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
